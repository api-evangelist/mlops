aid: mlops
name: MLOps
description: >-
  MLOps (Machine Learning Operations) is an engineering discipline that unifies
  machine learning development with operations to deploy, monitor, govern, and
  maintain machine learning models in production. MLOps.org publishes an
  end-to-end reference for designing, building, and managing reproducible,
  testable, and evolvable ML-powered software, including the CRISP-ML(Q)
  process model, the MLOps Stack Canvas, MLOps principles, and ML model
  governance practices. This index curates the canonical references, frameworks,
  and ecosystem resources for practicing MLOps across data engineering, ML
  pipelines, and model serving.
